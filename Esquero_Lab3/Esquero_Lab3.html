<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Restaurant - Valentine's Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
  body {
    background: #ffe3e3 url("Background2.jpg") no-repeat center center fixed; 
    background-size: cover;
    font-family: "Times New Roman", Times, serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  .overlay {
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 30px 40px;
    border-radius: 28px;
    width: 400px;
    position: relative; 
    box-shadow: 0 20px 50px rgba(216, 27, 96, 0.2);
    border: 1.5px solid rgba(255, 182, 193, 0.6);
    z-index: 10;
  }

  .overlay::before,
  .overlay::after {
    content: "🌸"; 
    position: absolute;
    top: -35px;
    font-size: 55px;
    z-index: 15;
    filter: drop-shadow(0 5px 10px rgba(255, 105, 180, 0.4));
    animation: flowerSway 4s ease-in-out infinite;
  }

  .overlay::before { left: -20px; }
  .overlay::after { right: -20px; animation-delay: 0.5s; }

  @keyframes flowerSway {
    0%, 100% { transform: rotate(-5deg) scale(1); }
    50% { transform: rotate(10deg) scale(1.1); }
  }

  .valentine-title {
    text-align: center;
    font-family: 'Great Vibes', cursive;
    font-size: 36px;
    color: #d81b60;
    margin-bottom: 2px;
  }

  h1 {
    text-align: center;
    color: #e63973;
    margin-bottom: 20px;
    font-size: 26px;
    letter-spacing: 1px;
  }

  label {
    color: #c2185b;
    font-weight: bold;
    font-size: 14px;
    display: block;
    margin-top: 12px;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ffb6c1;
    margin-top: 4px;
    box-sizing: border-box;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.9);
    transition: 0.3s;
  }

  input:focus {
    outline: none;
    border-color: #ff4d6d;
    background: #fff;
    box-shadow: 0 0 8px rgba(255, 77, 109, 0.3);
  }

  /* Error Style */
  input:invalid {
    border-color: #d81b60;
    animation: shake 0.3s;
  }

  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
  }

  .error-message {
    color: #d81b60;
    font-size: 12px;
    margin-top: 3px;
    display: block;
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 25px;
    background: linear-gradient(135deg, #ff4d6d, #ff758f);
    color: white;
    border: none;
    border-radius: 35px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.4s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
    letter-spacing: 1px;
  }
</style>
</head>

<body>

<div class="overlay">
  <div class="valentine-title">Happy Valentine's Day</div>
  <h1>💘 HTML Restaurant 💘</h1>

  <form>
    <label>Name:</label>
    <input type="text" placeholder="Your Name" required>

    <label>Email:</label>
    <input type="email" placeholder="heart@example.com" required>

    <label>Phone No.:</label>
    <input 
      type="tel" 
      id="phone"
      placeholder="09XXXXXXXXX"
      pattern="09[0-9]{9}"
      maxlength="11"
      inputmode="numeric"
      required
      oninvalid="this.setCustomValidity('Please enter a valid 11-digit phone number starting with 09.')"
      oninput="this.setCustomValidity('')">
    <small class="error-message">Must be 11 digits and start with 09.</small>

    <label>Date:</label>
    <input type="date" required>

    <label>How many persons?</label>
    <input type="number" min="1" required>

    <label>Special Notes:</label>
    <input type="text">

    <button type="submit">Reserve with Love!</button>
  </form>
</div>

</body>
</html>
