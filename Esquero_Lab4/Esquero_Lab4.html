<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic-Tac-Toe</title>
        <style>
            /* body element */
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background-color: #D2B48C;
                font-family: 'Segoe-UI', sans-serif;
            }

            .container {
                text-align: center;
                padding: 45px;
                border-radius: 15px;
            }

            h1 {
                font-size: 40px;
                font-weight: bold;
                color: #000000;
                margin-bottom: 30px;
            }

            .board {
                display: grid;
                grid-template-columns: repeat(3, 120px);
                grid-template-rows: repeat(3, 120px);
                gap: 12px;
                margin: 30px auto;
            }

            .cell {
                background-color: #F0F4F8;
                border-radius: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 3rem;
                font-weight: bold;
                color: #000000;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .cell:hover {
                background-color: #D6EAF8;
                transform: scale(1.05);
            }

            .reset-button {
                margin-top: 30px;
                padding: 25px 80px;
                background-color: #3498db;
                color: #FFFFFF;
                border-radius: 10px;
                cursor: pointer;
                transition: background 0.3s ease;
                border: none;
                font-size: 2rem;
                font-weight: 600;
                width: 400px;
                box-sizing: border-box;
            }

            .reset_button:hover {
                background-color: #2C80B4;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Tic-Tac-Toe</h1>

            <h2 id="status">Player X's Turn</h2>

            <div class="board">
                <div class="cell">O</div>
                <div class="cell">X</div>
                <div class="cell">X</div>
                <div class="cell">X</div>
                <div class="cell">O</div>
                <div class="cell">X</div>
            <div class="cell">O</div>
            <div class="cell">X</div>
            <div class="cell">O</div>
        </div>
        <button class="reset-button">Reset Game</button>
        </div>
        <script>
            const cells = document.querySelectorAll(".cell");
            const resetButton = document.querySelector(".reset-button");

            let currentPlayer = "X";
            let gameActive = True;

            const winningCombinations = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6]
            ];

            function checkWinner() {
                for (let combination of winningCombinations) {
                    const [a, b, c] = combination;

                    if (
                        cells[a].textContent !== "" &&
                        cells[a].textContent === cells[b].textContent &&
                        cells[a].textContent === cells[c].textContent
                    ) {
                        gameActive = false;
                        setTimeout(() => {
                            alert(currentPlayer + " Wins!");
                        }, 100);
                        return;
                    }
                }

                let draw = true;
                cells.forEach(cell => {
                    if (cell.textContent === "") {
                        draw = false;
                    }
                });

                if (draw && gameActive) {
                    gameActive = false;
                    setTimeout(() => {
                        alert("It's a Draw!");
                    }, 100);
                }
            }

            function handleCellClick(event) {
                const cell = even.target;

                if (!gameActive || cell.textContent !== "") {
                    return;
                }

                cell.textContent = currentPlayer;

                checkWinner();

                currentPlayer = currentPlayer === "X" ? "O" : "X";
            }

            function resetGame() {
                cells.forEach(cell => {
                    cell.textContent = "";
                });

                currentPlayer = "X";
                gameActive = true;
            }

            cells.forEach(cell => {
                cell.addEventListener("click", handleCellClick);
            });

            resetButton.addEventListener("click", restGame);
        </script>
    </body>
</html>
