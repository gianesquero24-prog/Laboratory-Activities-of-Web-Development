<!DOCTYPE html>
<html>
<head>
    <title>HTML Restaurant</title>
    <style> input {fontfamily: "Times New Roman", Times, serif; } </style>
</head>
<body>
    <h1>HTML Restaurant Reservation</h1>
    <form action="#" method="post">
        <!-- Name -->
        <label for="name">Name:</label>
        <br>
        <input type="text" id="name" name="name">
        <br>
        <br>

        <!-- Email -->
        <label for="email">Email:</label>
        <br>      
        <input type="email" id="email" name="email">
        <br>
        <br>

        <!-- Phone -->
        <label for="phone">Phone No.:</label>
        <br>
        <input type="tel" id="phone" name="phone">
        <br>
        <br>

        <!-- Date -->
        <label for="date">Date:</label>
        <br>
        <input type="date" id="date" name="date">
        <br>
        <br>

        <!-- Number of persons -->
        <label for="persons">How many persons will be with you?</label>
        <br>
        <input type="number" id="persons" name="persons">
        <br>
        <br>

        <!-- Notes -->
        <label for="notes">Notes:</label>
        <br>
        <input type="notes" id="notes" name="notes">
        <br>
        <br>

        <!-- Entry -->
        <label for="entry">Entry:</label>
        <br>
        <input type="text" id="entry" name="entry">
        <br>
        <br>

        <!-- Submit -->
        <button type="submit">Submit</button>
    </form>
</body>
</html>
